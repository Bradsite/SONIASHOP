<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soniashop — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=Work+Sans:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
  :root{
    --bg:#170F1F; --bg-alt:#241733; --gold:#E8A94A; --coral:#E8607A; --cream:#F6EEDD; --green:#3E7C59;
    --line:rgba(246,238,221,0.14);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg); color:var(--cream); font-family:'Work Sans',sans-serif;}
  h1,h2{font-family:'Fraunces',serif; font-weight:600;}
  .label{font-family:'Space Mono',monospace; font-size:0.7rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--gold);}

  #login-screen{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;}
  .login-box{background:var(--bg-alt); border:1px solid var(--line); border-radius:20px; padding:36px; max-width:340px; width:100%; text-align:center;}
  .login-box input{width:100%; padding:12px 14px; margin:18px 0; border-radius:10px; border:1px solid var(--line); background:var(--bg); color:var(--cream); font-family:inherit;}
  .login-box button{width:100%; padding:12px; border-radius:10px; border:none; background:var(--gold); color:var(--bg); font-weight:600; cursor:pointer;}
  .error{color:var(--coral); font-size:0.85rem; min-height:18px;}

  #app{display:none; max-width:1100px; margin:0 auto; padding:30px 20px 80px;}
  header{display:flex; justify-content:space-between; align-items:center; margin-bottom:30px; flex-wrap:wrap; gap:12px;}
  .logo{font-size:1.4rem; font-style:italic;}
  .logo span{color:var(--gold); font-style:normal;}
  .tabs{display:flex; gap:8px; margin-bottom:26px; flex-wrap:wrap;}
  .tab-btn{padding:9px 18px; border-radius:999px; border:1px solid var(--line); background:transparent; color:var(--cream); cursor:pointer; font-size:0.88rem;}
  .tab-btn.active{background:var(--gold); color:var(--bg); border-color:var(--gold);}
  .panel{display:none;}
  .panel.active{display:block;}

  .card{background:var(--bg-alt); border:1px solid var(--line); border-radius:16px; padding:22px; margin-bottom:20px;}
  .form-grid{display:grid; grid-template-columns:1.4fr 1fr 1fr 1.2fr auto; gap:10px; align-items:end;}
  .form-grid label{font-size:0.72rem; color:rgba(246,238,221,0.6); display:block; margin-bottom:5px;}
  .form-grid input, .form-grid select{width:100%; padding:10px 12px; border-radius:8px; border:1px solid var(--line); background:var(--bg); color:var(--cream); font-family:inherit; font-size:0.88rem;}
  .btn{padding:10px 16px; border-radius:8px; border:none; font-weight:600; cursor:pointer; font-size:0.85rem;}
  .btn-gold{background:var(--gold); color:var(--bg);}
  .btn-coral{background:var(--coral); color:var(--bg);}
  .btn-green{background:var(--green); color:var(--cream);}
  .btn-ghost{background:transparent; border:1px solid var(--line); color:var(--cream);}

  table{width:100%; border-collapse:collapse; font-size:0.87rem;}
  th{text-align:left; padding:10px 8px; color:rgba(246,238,221,0.5); font-size:0.72rem; text-transform:uppercase; letter-spacing:0.06em; border-bottom:1px solid var(--line);}
  td{padding:10px 8px; border-bottom:1px solid var(--line); vertical-align:middle;}
  td input, td select{background:var(--bg); border:1px solid var(--line); color:var(--cream); padding:6px 8px; border-radius:6px; font-size:0.85rem; width:100%;}
  .status-pill{padding:3px 10px; border-radius:999px; font-size:0.72rem; font-family:'Space Mono',monospace;}
  .status-pill.available{background:rgba(62,124,89,0.3); color:#8fd6ac;}
  .status-pill.reserved{background:rgba(232,169,74,0.25); color:var(--gold);}
  .status-pill.sold{background:rgba(255,255,255,0.1); color:rgba(246,238,221,0.6);}
  .row-actions{display:flex; gap:6px;}
  .empty{color:rgba(246,238,221,0.5); padding:20px 0; text-align:center;}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="label">Soniashop</div>
    <h1 style="margin-top:6px;">Espace admin</h1>
    <input type="password" id="pwd" placeholder="Mot de passe">
    <div class="error" id="login-error"></div>
    <button onclick="tryLogin()">Entrer</button>
  </div>
</div>

<div id="app">
  <header>
    <div class="logo">Sonia<span>shop</span> — Admin</div>
    <a href="index.html" class="btn btn-ghost" style="text-decoration:none;">Voir le site ↗</a>
  </header>

  <div class="tabs">
    <button class="tab-btn active" data-tab="produits">Produits</button>
    <button class="tab-btn" data-tab="reservations">Réservations actives</button>
    <button class="tab-btn" data-tab="commandes">Historique des commandes</button>
  </div>

  <!-- PRODUITS -->
  <div class="panel active" id="panel-produits">
    <div class="card">
      <div class="label" style="margin-bottom:14px;">Ajouter un produit</div>
      <div class="form-grid">
        <div><label>Nom</label><input id="new-name" placeholder="Ex: Escarpins Élégance"></div>
        <div><label>Catégorie</label>
          <select id="new-cat"><option>Chaussures</option><option>Sacs</option><option>Accessoires</option></select>
        </div>
        <div><label>Prix</label><input id="new-price" placeholder="Ex: 15 000 FCFA"></div>
        <div><label>Lien photo (optionnel)</label><input id="new-photo" placeholder="https://..."></div>
        <button class="btn btn-gold" onclick="addProduct()">Ajouter</button>
      </div>
    </div>
    <div class="card">
      <table>
        <thead><tr><th>Produit</th><th>Catégorie</th><th>Prix</th><th>Statut</th><th></th></tr></thead>
        <tbody id="products-table"><tr><td colspan="5" class="empty">Chargement…</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- RESERVATIONS -->
  <div class="panel" id="panel-reservations">
    <div class="card">
      <table>
        <thead><tr><th>Produit</th><th>Client</th><th>Téléphone</th><th>Expire</th><th></th></tr></thead>
        <tbody id="reservations-table"><tr><td colspan="5" class="empty">Chargement…</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- COMMANDES -->
  <div class="panel" id="panel-commandes">
    <div class="card">
      <table>
        <thead><tr><th>Date</th><th>Type</th><th>Produit</th><th>Client</th><th>Téléphone</th></tr></thead>
        <tbody id="orders-table"><tr><td colspan="5" class="empty">Chargement…</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<script src="firebase-config.js"></script>
<script>
function tryLogin(){
  const val = document.getElementById('pwd').value;
  if(val === ADMIN_PASSWORD){
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    sessionStorage.setItem('soniashop_admin_ok', '1');
    loadAll();
  } else {
    document.getElementById('login-error').textContent = "Mot de passe incorrect.";
  }
}
if(sessionStorage.getItem('soniashop_admin_ok') === '1'){
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
  });
});

async function addProduct(){
  const name = document.getElementById('new-name').value.trim();
  const category = document.getElementById('new-cat').value;
  const price = document.getElementById('new-price').value.trim();
  const photoUrl = document.getElementById('new-photo').value.trim();
  if(!name || !price){ alert("Merci de remplir au moins le nom et le prix."); return; }
  await db.collection('products').add({
    name, category, price, photoUrl: photoUrl || null, status: 'available', createdAt: Date.now()
  });
  document.getElementById('new-name').value = '';
  document.getElementById('new-price').value = '';
  document.getElementById('new-photo').value = '';
  loadProducts();
}

async function updateProductField(id, field, value){
  await db.collection('products').doc(id).update({ [field]: value });
}

async function deleteProduct(id){
  if(!confirm("Supprimer ce produit définitivement ?")) return;
  await db.collection('products').doc(id).delete();
  loadProducts();
}

async function markSold(id){
  await db.collection('products').doc(id).update({ status: 'sold', reservedUntil: null, reservedName: null, reservedPhone: null });
  loadAll();
}
async function markAvailable(id){
  await db.collection('products').doc(id).update({ status: 'available', reservedUntil: null, reservedName: null, reservedPhone: null });
  loadAll();
}

async function loadProducts(){
  const snap = await db.collection('products').orderBy('createdAt','desc').get();
  const tbody = document.getElementById('products-table');
  if(snap.empty){ tbody.innerHTML = '<tr><td colspan="5" class="empty">Aucun produit pour l\\'instant.</td></tr>'; return; }
  tbody.innerHTML = snap.docs.map(doc => {
    const p = { id: doc.id, ...doc.data() };
    return `
    <tr>
      <td><input value="${p.name}" onchange="updateProductField('${p.id}','name',this.value)"></td>
      <td>
        <select onchange="updateProductField('${p.id}','category',this.value)">
          ${['Chaussures','Sacs','Accessoires'].map(c => `<option ${c===p.category?'selected':''}>${c}</option>`).join('')}
        </select>
      </td>
      <td><input value="${p.price}" onchange="updateProductField('${p.id}','price',this.value)"></td>
      <td><span class="status-pill ${p.status}">${p.status}</span></td>
      <td class="row-actions">
        ${p.status !== 'sold' ? `<button class="btn btn-ghost" onclick="markSold('${p.id}')">Vendu</button>` : `<button class="btn btn-ghost" onclick="markAvailable('${p.id}')">Remettre en vente</button>`}
        <button class="btn btn-coral" onclick="deleteProduct('${p.id}')">Suppr.</button>
      </td>
    </tr>`;
  }).join('');
}

async function loadReservations(){
  const snap = await db.collection('products').where('status','==','reserved').get();
  const tbody = document.getElementById('reservations-table');
  if(snap.empty){ tbody.innerHTML = '<tr><td colspan="5" class="empty">Aucune réservation active.</td></tr>'; return; }
  tbody.innerHTML = snap.docs.map(doc => {
    const p = { id: doc.id, ...doc.data() };
    const daysLeft = p.reservedUntil ? Math.max(0, Math.ceil((p.reservedUntil - Date.now())/86400000)) : '?';
    return `
    <tr>
      <td>${p.name}</td>
      <td>${p.reservedName || '—'}</td>
      <td>${p.reservedPhone || '—'}</td>
      <td>${daysLeft} j restants</td>
      <td class="row-actions">
        <button class="btn btn-green" onclick="markSold('${p.id}')">Marquer vendu</button>
        <button class="btn btn-ghost" onclick="markAvailable('${p.id}')">Libérer</button>
      </td>
    </tr>`;
  }).join('');
}

async function loadOrders(){
  const snap = await db.collection('orders').orderBy('createdAt','desc').limit(200).get();
  const tbody = document.getElementById('orders-table');
  if(snap.empty){ tbody.innerHTML = '<tr><td colspan="5" class="empty">Aucune commande pour l\\'instant.</td></tr>'; return; }
  tbody.innerHTML = snap.docs.map(doc => {
    const o = doc.data();
    const date = new Date(o.createdAt).toLocaleString('fr-FR');
    return `
    <tr>
      <td>${date}</td>
      <td>${o.type === 'reservation' ? 'Réservation' : 'Commande'}</td>
      <td>${o.productName}</td>
      <td>${o.clientName || '—'}</td>
      <td>${o.clientPhone || '—'}</td>
    </tr>`;
  }).join('');
}

function loadAll(){
  loadProducts();
  loadReservations();
  loadOrders();
}
</script>
</body>
</html>
